version: "3.9"

networks:
  observability:
    driver: bridge
    name: observability-network

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:

services:

  # ─────────────────────────────────────────────────────────────────────────
  # APPLICATION
  # ─────────────────────────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: observability-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=fastapi-demo-app
      - OTEL_TRACES_EXPORTER=otlp
    networks:
      - observability
    depends_on:
      otel-collector:
        condition: service_started
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # PROMETHEUS
  # ─────────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: observability-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # ALERTMANAGER
  # ─────────────────────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: observability-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=http://localhost:9093"
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # NODE EXPORTER
  # ─────────────────────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: observability-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # CADVISOR
  # ─────────────────────────────────────────────────────────────────────────
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: observability-cadvisor
    restart: unless-stopped
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # GRAFANA
  # ─────────────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: observability-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-observability123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceToMetrics,tempoApmTable
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability
    depends_on:
      - prometheus
      - loki
      - jaeger

  # ─────────────────────────────────────────────────────────────────────────
  # LOKI
  # ─────────────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.5
    container_name: observability-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # PROMTAIL
  # ─────────────────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.5
    container_name: observability-promtail
    restart: unless-stopped
    ports:
      - "9080:9080"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    depends_on:
      - loki

  # ─────────────────────────────────────────────────────────────────────────
  # OPENTELEMETRY COLLECTOR
  # ─────────────────────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: observability-otel-collector
    restart: unless-stopped
    ports:
      - "4317:4317"    # OTLP gRPC receiver
      - "4318:4318"    # OTLP HTTP receiver
      - "8888:8888"    # Prometheus metrics (self-monitoring)
      - "8889:8889"    # Prometheus exporter
      - "13133:13133"  # Health check
    volumes:
      - ./otel-collector/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml:ro
    networks:
      - observability

  # ─────────────────────────────────────────────────────────────────────────
  # JAEGER
  # ─────────────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: observability-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC from OTEL Collector
      - "14268:14268"  # HTTP Thrift collector
      - "6831:6831/udp" # UDP compact Thrift agent (legacy)
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - ./jaeger:/badger
    networks:
      - observability
